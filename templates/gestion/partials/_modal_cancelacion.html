<!-- Modal Cancelación -->
<div class="modal fade" id="cancelModal{{ turno.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar Cancelación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                ¿Cancelar el turno de <strong>{{ turno.cliente }}</strong> a las <strong>{{ turno.fecha_hora|date:"H:i" }}</strong>?
                {% if turno.reserva %}
                    <div class="alert alert-warning mt-2 mb-0 py-2 small">
                        Este turno es parte de la reserva #{{ turno.reserva.id }}. Solo se cancela este bloque.
                    </div>
                {% endif %}
            </div>
            <div class="modal-footer flex-column flex-sm-row gap-2">
                <button type="button" class="btn btn-secondary w-100 w-sm-auto" data-bs-dismiss="modal">No, volver</button>
                <a href="{% url 'cancelar_turno' turno.id %}" class="btn btn-outline-danger w-100 w-sm-auto">Sí, cancelar sin notificar</a>
                <a href="{% url 'cancelar_turno' turno.id %}?whatsapp=true" 
                   target="_blank" 
                   class="btn btn-danger w-100 w-sm-auto"
                   onclick="setTimeout(() => { window.location.reload(); }, 500);">
                    <i class="bi bi-whatsapp"></i> Cancelar y notificar WhatsApp
                </a>
            </div>
        </div>
    </div>
</div>
